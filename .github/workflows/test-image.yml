name: Test Live Image Generation
on:
  workflow_dispatch:
    inputs:
      concept:
        description: 'Concept / Prompt for Elina photo'
        required: false
        default: 'wearing a tailored camel trench coat, Parisian cafe terrace, natural morning sunlight'

permissions:
  contents: write

jobs:
  verify_image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-core.txt
      - name: Run Live Image Verification
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRICT_FACE_ONLY: ${{ secrets.STRICT_FACE_ONLY }}
        run: python scripts/test_live_image.py
      - name: Upload Generated Image as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elina-test-photo
          path: content/images/*.jpg
          retention-days: 7
