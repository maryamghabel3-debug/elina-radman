name: Test Live Image Generation
on:
  workflow_dispatch:
    inputs:
      concept:
        description: 'Concept / Prompt for Elina photo'
        required: false
        default: 'wearing a tailored camel trench coat, Parisian cafe terrace, natural morning sunlight'

permissions:
  contents: write

jobs:
  verify_image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-core.txt
      - name: Run Live Image Verification
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          STRICT_FACE_ONLY: ${{ secrets.STRICT_FACE_ONLY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/test_live_image.py
      - name: Push generated test photo to repo
        if: success()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git remote set-url origin "https://ElinaOS:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add content/images/ || true
          if ! git diff --staged --quiet; then
            git commit -m "🎨 Live test photo generated [$(date +%Y-%m-%d-%H%M)]"
            git push || echo "Push skipped if GH_PAT not set"
          fi
      - name: Upload Generated Image as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elina-test-photo
          path: content/images/*.jpg
          retention-days: 7
