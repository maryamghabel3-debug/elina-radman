name: Diagnose Gemini Image Models
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests
      - name: List & test Gemini models for this key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/list_gemini_models.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-models-report
          path: content/gemini_models_report.json
          retention-days: 7
