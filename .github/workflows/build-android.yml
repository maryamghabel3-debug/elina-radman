name: Build Android APK

on:
  push:
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev autoconf \
            gettext libtool python3-dev python3-pip unzip zip git \
            zlib1g-dev libltdl-dev libsqlite3-dev \
            libopenal-dev cmake libpulse-dev xclip

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Build APK with Buildozer
        run: |
          cd app
          buildozer android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ElinaOS-Android-App
          path: app/bin/*.apk
