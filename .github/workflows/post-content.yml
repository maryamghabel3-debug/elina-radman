name: Publish Content
on:
  schedule: [{cron: '30 4,11,16 * * *'}]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests
      - name: Publish to platforms
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          POSTIZ_URL: ${{ secrets.POSTIZ_URL }}
          POSTIZ_API_TOKEN: ${{ secrets.POSTIZ_API_TOKEN }}
        run: python scripts/publish.py
      - name: Push status
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git remote set-url origin "https://ElinaOS:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add content/ || true
          if ! git diff --staged --quiet; then
            git commit -m "📤 Publish updates [$(date +%Y-%m-%d)]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Pushed successfully"
                break
              fi
              echo "⚠️ Push rejected (attempt $i/5), rebasing onto latest main..."
              git fetch origin main
              git rebase origin/main
              sleep $((RANDOM % 5 + 2))
            done
          fi
