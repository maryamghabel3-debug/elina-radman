name: Telegram Bot Runner
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests google-generativeai
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POSTIZ_URL: ${{ secrets.POSTIZ_URL }}
          POSTIZ_API_TOKEN: ${{ secrets.POSTIZ_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          RUN_MODE: ACTION
        run: python scripts/elina_bot.py
      - name: Push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git remote set-url origin "https://ElinaOS:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add content/ || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Bot updates [$(date +%Y-%m-%d)]"
            git push
          fi
