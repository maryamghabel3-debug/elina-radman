name: Telegram Bot Runner
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-core.txt
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          STRICT_FACE_ONLY: ${{ secrets.STRICT_FACE_ONLY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          LTK_CREATOR_ID: ${{ secrets.LTK_CREATOR_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          POSTIZ_URL: ${{ secrets.POSTIZ_URL }}
          POSTIZ_API_TOKEN: ${{ secrets.POSTIZ_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          RUN_MODE: ACTION
        run: python scripts/elina_bot.py
      - name: Push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git remote set-url origin "https://ElinaOS:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add content/ || true
          # content/images/ and content/videos/ are gitignored (auto-generated
          # media is usually too heavy to keep), but manually-uploaded photos
          # /videos via /setphoto & /setvideo ARE meant to persist — force-add
          # just those so they survive past this ephemeral runner.
          git add -f content/images/manual_*.jpg content/videos/manual_*.mp4 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Bot updates [$(date +%Y-%m-%d)]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Pushed successfully"
                break
              fi
              echo "⚠️ Push rejected (attempt $i/5), rebasing onto latest main..."
              git fetch origin main
              git rebase origin/main
              sleep $((RANDOM % 5 + 2))
            done
          fi
