name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: |
          pip install -r requirements-core.txt
          pip install pytest
      - name: Run test suite
        run: python -m pytest tests/ -q
