name: Generate Daily Content
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements-core.txt
      - name: Generate content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          STRICT_FACE_ONLY: ${{ secrets.STRICT_FACE_ONLY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          LTK_CREATOR_ID: ${{ secrets.LTK_CREATOR_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/generate.py
      - name: Push to repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git remote set-url origin "https://ElinaOS:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add content/queue/ || true
          if ! git diff --staged --quiet; then
            git commit -m "📋 Daily content [$(date +%Y-%m-%d)]"
            git push
          else
            echo "No changes to push"
          fi
