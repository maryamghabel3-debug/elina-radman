name: Generate Daily Content
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests google-generativeai
      - name: Generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/generate.py
      - name: Commit
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git add content/queue/ || true
          if ! git diff --staged --quiet; then
            git commit -m "Daily content [$(date +%Y-%m-%d)]"
            git push
          fi

cat > .github/workflows/bot-runner.yml << 'EOF'
name: Telegram Bot Runner
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install requests google-generativeai
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ secrets.REPO_OWNER }}
          REPO_NAME: ${{ secrets.REPO_NAME }}
          RUN_MODE: ACTION
        run: python scripts/elina_bot.py
      - name: Save
        run: |
          git config user.name "ElinaOS"
          git config user.email "elinaradman24@gmail.com"
          git add content/ || true
          if ! git diff --staged --quiet; then
            git commit -m "Bot updates [$(date +%Y-%m-%d)]"
            git push
          fi
