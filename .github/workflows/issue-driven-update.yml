name: Issue-Driven Update

on:
  issues:
    types: [opened, labeled]

jobs:
  apply-changes:
    if: contains(github.event.issue.labels.*.name, 'apply-change')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "Elina Radman Bot"
          git config user.email "bot@elina-radman.ai"

      - name: Apply Changes from Issue
        run: |
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue Body: ${{ github.event.issue.body }}"
          
          # در حال حاضر فقط لاگ می‌کند
          # بعداً می‌توانیم منطق ویرایش فایل را اضافه کنیم

      - name: Commit and Push
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Apply changes from issue #${{ github.event.issue.number }}"
            git push origin main
          fi

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              state: 'closed',
              labels: ['applied']
            })
